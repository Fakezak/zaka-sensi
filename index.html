<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAKA GOD MODE 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Inter;
    background:#050608;
    color:white;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    font-weight:900;
    background:linear-gradient(90deg,#ff0055,#6c5ce7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* VIDEO */
.video{
    width:100%;
    height:220px;
    border-radius:15px;
    overflow:hidden;
    margin-bottom:20px;
}

iframe{
    width:100%;
    height:100%;
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(135deg,#ff0055,#6c5ce7);
    color:white;
    margin-top:10px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

/* SENSI BOX */
.box{
    background:#111;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
}

/* FEATURES */
.features{
    margin-top:15px;
    font-size:14px;
    color:#00ffcc;
}

/* EXPORT */
.export{
    background:#222;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>ZAKA GOD MODE ⚡</h1>

<!-- VIDEO -->
<div class="video">
<iframe src="https://www.youtube.com/embed/a4EiputDwOs?autoplay=1&mute=1&controls=0&loop=1&playlist=a4EiputDwOs"></iframe>
</div>

<button onclick="generate()">⚡ GENERATE GOD SENSI</button>
<button onclick="applySensi()">💀 APPLY TO GAME</button>

<div class="box" id="result">
<div class="row"><span>General</span><span id="g">--</span></div>
<div class="row"><span>Red Dot</span><span id="r">--</span></div>
<div class="row"><span>2x Scope</span><span id="s2">--</span></div>
<div class="row"><span>4x Scope</span><span id="s4">--</span></div>
<div class="row"><span>Sniper</span><span id="sn">--</span></div>
<div class="row"><span>Free Look</span><span id="fl">--</span></div>
</div>

<div class="features" id="features"></div>

<div class="export" id="export"></div>

</div>

<script>

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// 24 MODIFIERS
const mods=[
v=>v+5,v=>v-5,v=>v+10,v=>v-10,
v=>v*1.05,v=>v*0.95,v=>v+3,v=>v-3,
v=>v+7,v=>v-7,v=>v*1.1,v=>v*0.9,
v=>v+12,v=>v-12,v=>v+8,v=>v-8,
v=>v+15,v=>v-15,v=>v+6,v=>v-6,
v=>v*1.03,v=>v*0.97,v=>v+2,v=>v-2
];

// FEATURES (14)
const feats=[
"No Recoil","Headlock","Drag Boost","Ultra Aim",
"Gyro Sync","FPS Boost","Zero Shake","Aim Lock",
"Red Dot Snap","Tracking Pro","Smooth Drag",
"Fast Flick","Touch Boost","Scope Lock"
];

function pickFeatures(){
let out=[];
while(out.length<5){
let f=feats[rand(0,feats.length-1)];
if(!out.includes(f)) out.push(f);
}
return out;
}

function applyMods(v){
let result=v;
for(let i=0;i<6;i++){
let m=mods[rand(0,mods.length-1)];
result=m(result);
}
return Math.max(0,Math.min(200,Math.round(result)));
}

// GENERATE
function generate(){

let g=applyMods(rand(170,200));
let r=applyMods(rand(175,200));
let s2=applyMods(rand(160,195));
let s4=applyMods(rand(140,185));
let sn=applyMods(rand(120,170));
let fl=applyMods(rand(150,190));

document.getElementById("g").innerText=g;
document.getElementById("r").innerText=r;
document.getElementById("s2").innerText=s2;
document.getElementById("s4").innerText=s4;
document.getElementById("sn").innerText=sn;
document.getElementById("fl").innerText=fl;

// FEATURES
let f=pickFeatures();
document.getElementById("features").innerText="🔥 "+f.join(" • ");

// EXPORT
document.getElementById("export").innerText=
`EXPORT CODE:
GEN:${g}|RD:${r}|2X:${s2}|4X:${s4}|SN:${sn}|FL:${fl}`;

// BUTTON FX
let btn=document.querySelector("button");
btn.innerText="⚡ GENERATING...";
setTimeout(()=>btn.innerText="🔥 DONE!",400);
setTimeout(()=>btn.innerText="⚡ GENERATE GOD SENSI",1200);
}

// APPLY FAKE
function applySensi(){
let btns=document.querySelectorAll("button")[1];
btns.innerText="💀 INJECTING...";
setTimeout(()=>{
btns.innerText="✅ APPLIED";
},800);

setTimeout(()=>{
btns.innerText="💀 APPLY TO GAME";
},2000);
}

</script>

</body>
</html>
