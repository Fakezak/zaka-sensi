<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAKA SENSI BOT 🤖</title>

<style>
body{
    margin:0;
    background:#050608;
    font-family:sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* VIDEO BACKGROUND */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
    opacity:0.2;
}

/* CHAT */
.chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.msg{
    max-width:75%;
    padding:12px;
    border-radius:15px;
    margin:8px 0;
    font-size:14px;
}

.bot{
    background:#111;
    align-self:flex-start;
}

.user{
    background:linear-gradient(135deg,#ff0055,#6c5ce7);
    align-self:flex-end;
}

/* INPUT */
.inputBox{
    display:flex;
    padding:10px;
    background:#000;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    margin-left:10px;
    padding:12px 15px;
    border:none;
    border-radius:10px;
    background:#ff0055;
    color:white;
    cursor:pointer;
}

/* TITLE */
.title{
    text-align:center;
    padding:10px;
    font-weight:bold;
    background:black;
}
</style>
</head>

<body>

<!-- CLEAN VIDEO (NO YOUTUBE BAR) -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-gaming-session-5176/1080p.mp4" type="video/mp4">
</video>

<div class="title">ZAKA SENSI BOT 🤖</div>

<div class="chat" id="chat">
<div class="msg bot">💀 Welcome to Zaka Sensi Bot<br>Type your device (Android / iPhone)</div>
</div>

<div class="inputBox">
<input id="input" placeholder="Type your phone...">
<button onclick="send()">Generate</button>
</div>

<script>

// RANDOM
function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// GENERATE SENSI
function generateSensi(){
return {
g:rand(170,200),
r:rand(170,200),
s2:rand(150,190),
s4:rand(130,180),
sn:rand(110,160),
fl:rand(140,190)
};
}

// CHAT ADD
function addMsg(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerHTML=text;
document.getElementById("chat").appendChild(div);
div.scrollIntoView();
}

// SEND
function send(){
let input=document.getElementById("input");
let val=input.value.trim();
if(!val) return;

addMsg(val,"user");
input.value="";

setTimeout(()=>{

let s=generateSensi();

addMsg(`⚡ Generating GOD SENSI...`,"bot");

setTimeout(()=>{
addMsg(`
🔥 <b>YOUR SENSI</b><br><br>
General: ${s.g}<br>
Red Dot: ${s.r}<br>
2x Scope: ${s.s2}<br>
4x Scope: ${s.s4}<br>
Sniper: ${s.sn}<br>
Free Look: ${s.fl}<br><br>
💀 Headlock Enabled
`,"bot");
},800);

},500);
}

</script>

</body>
</html>
