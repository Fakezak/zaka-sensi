<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAKA SENSI BOT 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0612;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Simple video container */
        .video-header {
            width: 100%;
            background: #000;
            position: relative;
            border-bottom: 3px solid #ff0055;
        }

        #simpleVideo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #1a1a2e;
        }

        /* Title bar */
        .top-bar {
            background: #0d0b1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ff0055;
        }

        .top-bar h1 {
            font-size: 2rem;
            background: linear-gradient(45deg, #ff0055, #7700ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .top-bar p {
            color: #b388ff;
            font-size: 1rem;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 350px);
        }

        .message {
            max-width: 85%;
            margin: 12px 0;
            padding: 15px 20px;
            border-radius: 25px;
            font-size: 1rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            background: #1e1a2e;
            border-left: 5px solid #ff0055;
            align-self: flex-start;
            margin-right: auto;
            border-radius: 25px 25px 25px 5px;
        }

        .user-message {
            background: linear-gradient(135deg, #ff0055, #8a2be2);
            align-self: flex-end;
            margin-left: auto;
            border-radius: 25px 25px 5px 25px;
        }

        /* Sensi grid */
        .sensi-box {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #ff3377;
        }

        .sensi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat {
            background: rgba(255,0,85,0.1);
            padding: 12px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            color: #ff99bb;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffbb00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ff3377;
        }

        .badge {
            background: #ff0055;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Input area */
        .input-area {
            display: flex;
            padding: 20px;
            background: #0d0b1a;
            border-top: 2px solid #ff0055;
            gap: 12px;
            position: sticky;
            bottom: 0;
        }

        #userInput {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 30px;
            background: #1f1b30;
            color: white;
            font-size: 1rem;
            outline: 2px solid transparent;
        }

        #userInput:focus {
            outline: 2px solid #ff0055;
            background: #2a2540;
        }

        #sendBtn {
            padding: 16px 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #ff0055, #9d4dff);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px #ff0055;
        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #ff3377;
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ff99bb;
            border-top: 3px solid #ff0055;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Fallback if video doesn't load */
        .video-fallback {
            display: none;
        }
    </style>
</head>
<body>

    <!-- SIMPLE VIDEO THAT WILL DEFINITELY WORK -->
    <div class="video-header">
        <video id="simpleVideo" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-gamer-playing-on-a-computer-43390-large.mp4" type="video/mp4">
            <!-- Fallback text if video fails -->
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
        <h1>⚡ ZAKA SENSI ⚡</h1>
        <p>14 FEATURES · 24/7 · HEADLOCK</p>
    </div>

    <!-- CHAT MESSAGES -->
    <div class="chat-container" id="chatMessages">
        <div class="message bot-message">
            💀 <strong>WELCOME TO GOD SENSITIVITY</strong><br>
            Type your device (Android / iPhone / iPad) and get 14 tuned stats 🔥
        </div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter your phone model..." autocomplete="off">
        <button id="sendBtn">GENERATE</button>
    </div>

    <script>
        // Get elements
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // Video error handling
        const video = document.getElementById('simpleVideo');
        video.onerror = function() {
            console.log("Video failed to load, but that's okay");
            // Video will just show black, no big deal
        };

        // Random number generator
        function randomNum(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Generate 14 sensitivity values
        function generateSensi() {
            return {
                general: randomNum(165, 215),
                redDot: randomNum(155, 210),
                holo: randomNum(150, 205),
                scope2x: randomNum(140, 195),
                scope3x: randomNum(130, 185),
                scope4x: randomNum(125, 180),
                scope6x: randomNum(115, 175),
                sniper: randomNum(105, 165),
                freeLook: randomNum(140, 200),
                gyroGeneral: randomNum(180, 250),
                gyroScope: randomNum(165, 235),
                tppAim: randomNum(150, 220),
                fppAim: randomNum(140, 210),
                ads: randomNum(130, 190)
            };
        }

        // Add message to chat
        function addMessage(text, isUser = false, isHTML = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (isHTML) {
                messageDiv.innerHTML = text;
            } else {
                messageDiv.textContent = text;
            }
            
            chatMessages.appendChild(messageDiv);
            messageDiv.scrollIntoView({ behavior: 'smooth' });
            return messageDiv;
        }

        // Create sensi display HTML
        function createSensiHTML(sensi, device) {
            return `
                <div style="margin-bottom: 10px;">
                    <span style="background:#ff0055; padding:5px 15px; border-radius:20px; font-weight:bold;">🎯 FOR ${device.toUpperCase()}</span>
                </div>
                <div class="sensi-box">
                    <div class="sensi-grid">
                        <div class="stat"><span class="stat-label">GENERAL</span><div class="stat-value">${sensi.general}</div></div>
                        <div class="stat"><span class="stat-label">RED DOT</span><div class="stat-value">${sensi.redDot}</div></div>
                        <div class="stat"><span class="stat-label">HOLO</span><div class="stat-value">${sensi.holo}</div></div>
                        <div class="stat"><span class="stat-label">2X SCOPE</span><div class="stat-value">${sensi.scope2x}</div></div>
                        <div class="stat"><span class="stat-label">3X SCOPE</span><div class="stat-value">${sensi.scope3x}</div></div>
                        <div class="stat"><span class="stat-label">4X SCOPE</span><div class="stat-value">${sensi.scope4x}</div></div>
                        <div class="stat"><span class="stat-label">6X SCOPE</span><div class="stat-value">${sensi.scope6x}</div></div>
                        <div class="stat"><span class="stat-label">SNIPER</span><div class="stat-value">${sensi.sniper}</div></div>
                        <div class="stat"><span class="stat-label">FREE LOOK</span><div class="stat-value">${sensi.freeLook}</div></div>
                        <div class="stat"><span class="stat-label">GYRO GEN</span><div class="stat-value">${sensi.gyroGeneral}</div></div>
                        <div class="stat"><span class="stat-label">GYRO SCOPE</span><div class="stat-value">${sensi.gyroScope}</div></div>
                        <div class="stat"><span class="stat-label">TPP AIM</span><div class="stat-value">${sensi.tppAim}</div></div>
                        <div class="stat"><span class="stat-label">FPP AIM</span><div class="stat-value">${sensi.fppAim}</div></div>
                        <div class="stat"><span class="stat-label">ADS</span><div class="stat-value">${sensi.ads}</div></div>
                    </div>
                    <div class="badge-container">
                        <span class="badge">🔞 24/7 MODE</span>
                        <span class="badge" style="background:#7700ff;">⚡ HEADLOCK ON</span>
                    </div>
                </div>
            `;
        }

        // Handle send message
        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message
            addMessage(`📱 ${text}`, true);
            userInput.value = '';

            // Add loading message
            const loadingMsg = addMessage(`Generating 14 features ${'<span class="loading"></span>'}`, false, true);

            // Generate after delay
            setTimeout(() => {
                // Remove loading message
                if (loadingMsg && loadingMsg.parentNode) {
                    loadingMsg.remove();
                }

                // Generate sensi
                const sensi = generateSensi();
                const sensiHTML = createSensiHTML(sensi, text);
                
                // Add the sensi message
                addMessage(sensiHTML, false, true);
            }, 1200);
        }

        // Event listeners
        sendBtn.addEventListener('click', handleSend);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSend();
            }
        });

        // Focus input
        userInput.focus();

        // Make sure video plays
        video.play().catch(e => console.log("Autoplay prevented, but that's fine"));
    </script>
</body>
</html>
