<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAKA SENSI BOT · 14 FEATS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ─── YOUTUBE BACKGROUND (CLEAN, NO CONTROLS, AUTO LOOP) ─── */
    #yt-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;          /* allow clicking through to chat */
      z-index: 0;
      opacity: 0.28;                  /* dark blend – matrix vibe */
    }

    #yt-background iframe {
      width: 100vw;
      height: 100vh;
      pointer-events: none;           /* no accidental pause/controls */
      border: 0;
    }

    /* dark overlay to deepen readability */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(0,10,20,0.65) 0%, #030405 95%);
      z-index: 1;
      pointer-events: none;
    }

    /* ─── MAIN CHAT LAYER (above video + overlay) ─── */
    .app {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      backdrop-filter: blur(2px);
    }

    /* header – slick with glow */
    .title {
      text-align: center;
      padding: 18px 10px;
      font-weight: 800;
      font-size: 1.7rem;
      letter-spacing: 2px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 0, 85, 0.5);
      box-shadow: 0 4px 20px rgba(255, 0, 85, 0.2);
      color: #fff;
      text-shadow: 0 0 8px #ff0055, 0 0 15px #6c5ce7;
      z-index: 5;
    }

    .title span {
      background: linear-gradient(145deg, #ffb6c1, #a0a0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.9rem;
    }

    /* chat container – smooth scroll */
    .chat {
      flex: 1;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    /* message bubbles – neon accents */
    .msg {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 26px;
      font-size: 1rem;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .bot {
      background: rgba(20, 25, 35, 0.9);
      border-left: 5px solid #ff0055;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      color: #f0f0ff;
    }

    .user {
      background: linear-gradient(135deg, rgba(255,0,85,0.95), rgba(108,92,231,0.95));
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      border-right: 3px solid white;
      color: white;
      font-weight: 500;
      text-shadow: 0 2px 5px black;
    }

    /* sensi stats grid inside bot message */
    .sensi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 20px;
      background: rgba(0, 0, 0, 0.5);
      padding: 16px 18px;
      border-radius: 24px;
      margin-top: 10px;
      border: 1px solid #ff4477;
    }

    .sensi-item {
      display: flex;
      flex-direction: column;
    }

    .sensi-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ff9fbb;
    }

    .sensi-value {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(to right, #ffaa33, #ff3b7f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .sensi-footnote {
      margin-top: 16px;
      border-top: 1px dashed #ff4477;
      padding-top: 12px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      color: #b0b0ff;
    }

    .badge {
      background: #ff0055;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: white;
    }

    /* input area – glassmorphic */
    .inputBox {
      display: flex;
      padding: 18px 15px;
      gap: 12px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 0, 85, 0.5);
      z-index: 6;
    }

    input {
      flex: 1;
      padding: 16px 20px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
      outline: 2px solid transparent;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }

    input:focus {
      outline: 2px solid #ff0055;
      background: rgba(255, 255, 255, 0.2);
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
      font-weight: 300;
    }

    button {
      padding: 16px 28px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(145deg, #ff0055, #8a2be2);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 20px #ff0055;
      transition: 0.2s;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,240,0.3);
    }

    button:hover {
      box-shadow: 0 0 30px #ff3b7f;
      transform: scale(1.02);
    }

    /* responsive fine-tuning */
    @media (max-width: 600px) {
      .title { font-size: 1.4rem; }
      .msg { max-width: 90%; }
      .sensi-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <!-- YOUTUBE BACKGROUND - AUTO LOOP, NO CONTROLS, EXACT SHORT (embed with extra params) -->
  <div id="yt-background">
    <iframe 
      src="https://www.youtube.com/embed/a4EiputDwOs?autoplay=1&mute=1&loop=1&playlist=a4EiputDwOs&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&rel=0&cc_load_policy=0&playsinline=1&autohide=1&start=0&end=60&vq=hd1080"
      frameborder="0"
      allow="autoplay; encrypted-media; picture-in-picture"
      allowfullscreen="false"
      title="background sensi short"
    ></iframe>
  </div>
  <div class="overlay"></div> <!-- extra dim/glow -->

  <!-- MAIN APP -->
  <div class="app">
    <div class="title">
      <span>⚡ ZAKA SENSI BOT ⚡</span><br>
      14 FEATURES · 24/7 MOD
    </div>

    <!-- chat messages container -->
    <div class="chat" id="chat">
      <div class="msg bot">
        💀 <strong>WELCOME TO GOD SENSITIVITY</strong><br>
        Type your device (Android / iPhone / iPad) and get 14 tuned stats 🔥
      </div>
    </div>

    <!-- input area -->
    <div class="inputBox">
      <input id="input" type="text" placeholder="e.g., iPhone 14 Pro / Android ..." autocomplete="off">
      <button onclick="sendMessage()">GENERATE</button>
    </div>
  </div>

  <script>
    (function() {
      // grab DOM
      const chatDiv = document.getElementById('chat');
      const inputField = document.getElementById('input');

      // ----- 14 SENSITIVITY FEATURES (EXTENDED) -----
      function generateFullSensi() {
        return {
          // classic 6 (expanded)
          general: random(160, 210),
          redDot: random(155, 205),
          holo: random(150, 200),      // extra
          scope2x: random(140, 190),
          scope3x: random(130, 180),    // extra
          scope4x: random(125, 175),
          scope6x: random(115, 165),    // extra
          sniper: random(110, 160),
          freeLook: random(140, 190),
          // additional tactical
          gyroGeneral: random(180, 240),
          gyroScope: random(160, 220),
          tppAim: random(150, 210),     // third person
          fppAim: random(145, 200),      // first person
          adsSensitivity: random(120, 170) // extra
        };
      }

      function random(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      // format message with 14 values using a 2‑col grid (7 rows)
      function formatSensiMessage(s) {
        return `
          <div class="sensi-grid">
            <div class="sensi-item"><span class="sensi-label">GENERAL</span><span class="sensi-value">${s.general}</span></div>
            <div class="sensi-item"><span class="sensi-label">RED DOT</span><span class="sensi-value">${s.redDot}</span></div>
            <div class="sensi-item"><span class="sensi-label">HOLO</span><span class="sensi-value">${s.holo}</span></div>
            <div class="sensi-item"><span class="sensi-label">2X SCOPE</span><span class="sensi-value">${s.scope2x}</span></div>
            <div class="sensi-item"><span class="sensi-label">3X SCOPE</span><span class="sensi-value">${s.scope3x}</span></div>
            <div class="sensi-item"><span class="sensi-label">4X SCOPE</span><span class="sensi-value">${s.scope4x}</span></div>
            <div class="sensi-item"><span class="sensi-label">6X SCOPE</span><span class="sensi-value">${s.scope6x}</span></div>
            <div class="sensi-item"><span class="sensi-label">SNIPER</span><span class="sensi-value">${s.sniper}</span></div>
            <div class="sensi-item"><span class="sensi-label">FREE LOOK</span><span class="sensi-value">${s.freeLook}</span></div>
            <div class="sensi-item"><span class="sensi-label">GYRO GEN</span><span class="sensi-value">${s.gyroGeneral}</span></div>
            <div class="sensi-item"><span class="sensi-label">GYRO SCOPE</span><span class="sensi-value">${s.gyroScope}</span></div>
            <div class="sensi-item"><span class="sensi-label">TPP AIM</span><span class="sensi-value">${s.tppAim}</span></div>
            <div class="sensi-item"><span class="sensi-label">FPP AIM</span><span class="sensi-value">${s.fppAim}</span></div>
            <div class="sensi-item"><span class="sensi-label">ADS SENSE</span><span class="sensi-value">${s.adsSensitivity}</span></div>
          </div>
          <div class="sensi-footnote">
            <span class="badge">🔞 24/7 HARDCORE</span>
            <span>⚡ HEADLOCK + ZAKA TUNED</span>
          </div>
        `;
      }

      // add message to chat (type = 'bot' or 'user')
      function addMessage(htmlContent, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerHTML = htmlContent;
        chatDiv.appendChild(msgDiv);
        // auto-scroll to bottom
        msgDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // loading / intermediate message then final
      function sendMessage() {
        const userText = inputField.value.trim();
        if (userText === '') return;

        // 1. show user message
        addMessage(`📱 ${userText}`, 'user');
        inputField.value = '';

        // 2. show "generating" bot message (optional loading)
        const loadingId = 'loading-' + Date.now();
        addMessage(`⏳ Generating 14 features for <strong>${userText}</strong> ...`, 'bot');

        // 3. after delay, replace loading with full sensi (remove loading + add final)
        setTimeout(() => {
          // remove the last bot message (loading) – optional but cleaner
          const allMessages = chatDiv.querySelectorAll('.msg');
          if (allMessages.length > 0) {
            const lastMsg = allMessages[allMessages.length - 1];
            if (lastMsg.classList.contains('bot') && lastMsg.innerHTML.includes('⏳')) {
              lastMsg.remove();  // remove loading
            }
          }

          // generate fresh 14 stats
          const sensi = generateFullSensi();
          const statsHTML = formatSensiMessage(sensi);

          addMessage(`
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:8px;">
              <span style="background:#ff0055; padding:4px 16px; border-radius:40px; font-weight:bold;">🎯 PERFECT SENSI</span>
              <span>for ${userText}</span>
            </div>
            ${statsHTML}
          `, 'bot');
        }, 750); // short delay after loading
      }

      // also handle enter key
      inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });

      // Optional: pre-populate with a welcome extra message after page load (already got one)
      // but we can push second message to demo? no, keep minimal.

      // small extra: focus input
      inputField.focus();

      // ensure iframe stays invisible to clicks (already pointer-events:none)
    })();
  </script>

  <!-- additional safety to mute any iframe sound if youtube starts unmuted (but we have mute=1) -->
</body>
</html>
